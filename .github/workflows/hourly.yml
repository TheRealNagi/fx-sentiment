name: FX Sentiment Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Verify secret exists
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "Secret length: ${#GOOGLE_SERVICE_ACCOUNT_JSON}"
          echo "First 5 chars: ${GOOGLE_SERVICE_ACCOUNT_JSON:0:5}"
          
- name: Show file contents
        run: |
          echo "=== Python file head ==="
          head -70 fx_sentiment.py
          echo "=== Line 59 specifically ==="
          sed -n '55,65p' fx_sentiment.py
          
      - name: Run pipeline
        env:
          MYFXBOOK_EMAIL:              ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD:           ${{ secrets.MYFXBOOK_PASSWORD }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_TOKEN:              ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS:           ${{ secrets.TELEGRAM_CHAT_IDS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python fx_sentiment.py
